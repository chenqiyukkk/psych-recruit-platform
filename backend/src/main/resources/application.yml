server:
  port: 8080

spring:
  application:
    name: psych-recruit-platform-backend
  datasource:
    url: jdbc:mysql://localhost:3306/psych_recruit_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    # 需要至少 32 字符，HS256 才安全且可用
    secret: ${APP_JWT_SECRET:please-change-this-jwt-secret-to-32-chars-minimum}
    expiration-ms: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
